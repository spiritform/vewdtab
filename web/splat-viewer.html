<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vewd Tab Splat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #viewerContainer { position: relative; flex: 1; min-height: 0; }
        canvas { width: 100%; height: 100%; display: block; outline: none; }
        .error {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #ff6b6b; padding: 20px; max-width: 80%;
        }
        .error.hidden { display: none; }
        #controlsBar {
            display: flex; justify-content: center; align-items: center;
            gap: 12px; background: #1a1a1a; padding: 6px 12px;
            border-top: 1px solid #222; flex-shrink: 0;
        }
        #controlsBar button {
            background: #2a2a2a; border: none; color: #ddd;
            padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px;
        }
        #controlsBar button:hover { background: #3a3a3a; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "./js/three.module.min.js"
        }
    }
    </script>
</head>
<body>
    <div id="viewerContainer">
        <canvas id="canvas"></canvas>
        <div id="error" class="error hidden"></div>
    </div>
    <div id="controlsBar">
        <button id="resetCamera" title="Reset camera">Reset View</button>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "./js/OrbitControls.js";
        import { SparkRenderer, SplatMesh } from "./js/spark.module.min.js";

        const canvas = document.getElementById("canvas");
        const errorEl = document.getElementById("error");

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.remove("hidden");
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1000);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);

        const spark = new SparkRenderer({ renderer });
        scene.add(spark);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        let currentSplat = null;
        let initialCamPos = camera.position.clone();
        let initialTarget = new THREE.Vector3(0, 0, 0);

        function resize() {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            renderer.setSize(w, h, false);
            camera.aspect = w / h || 1;
            camera.updateProjectionMatrix();
        }
        window.addEventListener("resize", resize);
        resize();

        function frame() {
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(frame);
        }
        frame();

        function frameSplat(mesh) {
            let box;
            try {
                box = mesh.getBoundingBox?.(true);
            } catch (e) { box = null; }
            if (!box || box.isEmpty()) box = new THREE.Box3().setFromObject(mesh);
            if (box && !box.isEmpty()) {
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z) || 1;
                const fov = camera.fov * (Math.PI / 180);
                const dist = (maxDim / 2) / Math.tan(fov / 2) * 1.8;
                camera.position.copy(center).add(new THREE.Vector3(0, 0, dist));
                controls.target.copy(center);
                initialCamPos = camera.position.clone();
                initialTarget = center.clone();
                controls.update();
                console.log("[Vewd2Splat] framed:", center.toArray(), "size", size.toArray());
            } else {
                console.warn("[Vewd2Splat] no bounds; using default camera");
            }
        }

        function loadFromBytes(buffer, filename) {
            try {
                if (currentSplat) {
                    spark.remove(currentSplat);
                    currentSplat.dispose?.();
                    currentSplat = null;
                }
                errorEl.classList.add("hidden");

                const bytes = new Uint8Array(buffer);
                const extMatch = (filename || "").match(/\.([a-z0-9]+)$/i);
                const fileType = extMatch ? extMatch[1].toLowerCase() : undefined;
                console.log("[Vewd2Splat] loading", filename, "type:", fileType, "bytes:", bytes.length);
                const mesh = new SplatMesh({
                    fileBytes: bytes,
                    fileName: filename,
                    fileType,
                    onLoad: () => {
                        currentSplat = mesh;
                        mesh.rotation.x = Math.PI;
                        spark.add(mesh);
                        frameSplat(mesh);
                        console.log("[Vewd2Splat] onLoad fired, splat count:", mesh.packedSplats?.numSplats);
                        window.parent.postMessage({ type: "MESH_LOADED", filename }, "*");
                    },
                });
                mesh.initialized.catch((err) => {
                    const msg = "Failed to load splat: " + (err?.message || err);
                    console.error("[Vewd2Splat]", msg);
                    showError(msg);
                    window.parent.postMessage({ type: "MESH_ERROR", error: msg }, "*");
                });
            } catch (err) {
                console.error("[Vewd2Splat] Load error:", err);
                showError("Failed to load: " + err.message);
            }
        }

        document.getElementById("resetCamera").addEventListener("click", () => {
            camera.position.copy(initialCamPos);
            controls.target.copy(initialTarget);
            controls.update();
        });

        window.addEventListener("message", (event) => {
            const { type, data, filename } = event.data || {};
            if (type === "LOAD_MESH_DATA" && data) {
                loadFromBytes(data, filename || "splat");
            }
        });

        console.log("[Vewd2Splat] Ready");
    </script>
</body>
</html>
